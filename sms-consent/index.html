<main class="container" style="max-width:720px;margin:40px auto;">

  <h1 style="margin-bottom:10px;">SMS Communication Consent</h1>
  <p style="color:#555;margin-bottom:30px;">
    Please provide your phone number below. SMS consent is optional and not required
    to submit this form.
  </p>

  <form>

    <div style="margin-bottom:20px;">
      <label style="font-weight:600;">
        Mobile Phone Number
      </label><br>
      <input
        type="tel"
        name="phone"
        placeholder="e.g. 845-555-1234"
        style="
          width:100%;
          padding:12px;
          margin-top:6px;
          font-size:16px;
          border:1px solid #ccc;
          border-radius:6px;
        ">
    </div>

    <!-- Consent Box -->
    <div style="
      border:1px solid #e5e7eb;
      background:#f9fafb;
      padding:16px;
      border-radius:8px;
      margin-bottom:25px;
    ">
      <label style="display:flex;gap:10px;cursor:pointer;">
        <input type="checkbox" name="sms_consent" style="margin-top:4px;">
        <span style="font-size:14px;line-height:1.6;">
          By checking this box, you agree to receive recurring SMS messages from
          <strong>Frontline Reception</strong> related to your request for information.
          Message and data rates may apply. Carriers are not liable for delayed or
          undelivered messages. Text <strong>HELP</strong> for help and
          <strong>STOP</strong> to unsubscribe.
          <br><br>
          <a href="/txt" target="_blank">View SMS Terms & Privacy</a>
        </span>
      </label>
    </div>

    <button
      type="submit"
      style="
        background:#2563eb;
        color:#fff;
        border:none;
        padding:12px 24px;
        font-size:16px;
        border-radius:6px;
        cursor:pointer;
      ">
      Submit
    </button>

  </form>

  <p style="margin-top:25px;font-size:13px;color:#666;">
    Consent is not a condition of purchase or service.
  </p>

</main>
